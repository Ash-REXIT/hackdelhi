services:
  postgres:
    image: postgres:16-alpine
    container_name: tia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tia
      POSTGRES_PASSWORD: tia_secret
      POSTGRES_DB: tia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tia -d tia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tia-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://tia:tia_secret@postgres:5432/tia_db?schema=public
      PORT: 3001
      NODE_ENV: production
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - generated_data:/app/generated
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tia-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DATABASE_URL: postgresql://tia:tia_secret@postgres:5432/tia_db?schema=public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: tia-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  generated_data:
